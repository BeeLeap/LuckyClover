<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LuckyClover 页面未找到提示页，可返回首页继续浏览其他内容。">
  <title>404 - LuckyClover</title>
  <link rel="stylesheet" href="assets/css/modern-fixed.css">
  <link rel="icon" href="images/cd.ico">
  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .not-found-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px;
      max-width: 560px;
      width: 100%;
    }
    .not-found-card h1 { font-size: 4rem; margin-bottom: 8px; }
    .not-found-card p { color: var(--text-secondary); margin-bottom: 20px; }
  </style>
</head>
<body>
  <main class="not-found">
    <section class="not-found-card">
      <h1>404</h1>
      <p>页面不存在，你可以返回首页继续浏览。</p>
      <a class="btn btn-primary" href="index.html">立即返回首页</a>
    </section>
  </main>
</body>
</html>
