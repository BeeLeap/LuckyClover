<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>如何加入服务器 - LuckyClover</title>
  <link rel="stylesheet" href="assets/css/modern.css">
  <link rel="shortcut icon" href="images/cd.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .steps { max-width: 700px; margin: 0 auto; }
    .step-card { display: flex; gap: 24px; padding: 32px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); margin-bottom: 20px; }
    .step-number { width: 48px; height: 48px; background: var(--accent-gradient); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: 1.25rem; font-weight: 700; flex-shrink: 0; }
    .step-content h3 { font-size: 1.25rem; margin-bottom: 12px; }
    .step-content p { color: var(--text-secondary); }
    .step-content .btn { margin-top: 16px; }
    .page-header { text-align: center; padding: 120px 24px 60px; }
    .page-header h1 { font-size: 3rem; margin-bottom: 16px; }
    .page-header p { font-size: 1.125rem; color: var(--text-secondary); }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo"><div class="logo-icon">🍀</div><span>LuckyClover</span></a>
        <button class="mobile-menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
        <nav>
          <a href="index.html">首页</a>
          <a href="team.html">团队</a>
          <a href="status.html">服务器状态</a>
          <a href="note.html">最新动态</a>
        </nav>
      </div>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <h1>如何<span style="color: var(--accent-secondary);">加入</span></h1>
      <p>服务器登录教程</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="steps">
        <div class="step-card">
          <div class="step-number">1</div>
          <div class="step-content">
            <h3>下载Minecraft</h3>
            <p>服务器版本为最新版，请在应用商店下载或购买正版Minecraft基岩版。</p>
            <a href="https://play.google.com/store/apps/details?id=com.mojang.minecraftpe" class="btn btn-secondary" target="_blank">谷歌商店</a>
            <a href="https://www.microsoft.com/zh-cn/store/p/minecraft-for-windows/9nblggh2jhxj" class="btn btn-secondary" target="_blank">微软商店</a>
          </div>
        </div>
        <div class="step-card">
          <div class="step-number">2</div>
          <div class="step-content">
            <h3>加入交流群</h3>
            <p>点击下方按钮加入QQ交流群，获取服务器IP地址和白名单申请方式。</p>
            <a href="https://qm.qq.com/q/VpseZW3KO6" class="btn btn-primary" target="_blank">加入交流群</a>
          </div>
        </div>
        <div class="step-card">
          <div class="step-number">3</div>
          <div class="step-content">
            <h3>进入服务器</h3>
            <p>在游戏中添加服务器IP地址即可加入LuckyClover服务器。</p>
            <p style="margin-top: 12px; color: var(--accent-secondary);">服务器IP: play.beeeeeawa.top:23063</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-left">
          <div class="logo-icon" style="width:32px;height:32px;font-size:1rem;">🍀</div>
          <p>© 2024 LuckyClover. All Rights Reserved.</p>
        </div>
        <div class="footer-right">
          <a href="https://github.com/beeeee-really">Github</a>
        </div>
      </div>
    </div>
  </footer>
  <script>
    function toggleMenu() { document.querySelector('nav').classList.toggle('active'); }
    document.querySelectorAll('nav a').forEach(link => { link.addEventListener('click', () => { if (window.innerWidth <= 768) document.querySelector('nav').classList.remove('active'); }); });
  </script>
</body>
</html>
