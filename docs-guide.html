<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>新手指南 - LuckyClover Docs</title><link rel="stylesheet" href="assets/css/modern-fixed.css"><link rel="shortcut icon" href="images/cd.ico"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>.docs-layout{display:grid;grid-template-columns:260px minmax(0,1fr);gap:24px;padding:120px 24px 48px;max-width:1440px;margin:0 auto}.docs-sidebar,.docs-content{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-lg);box-shadow:var(--shadow-card)}.docs-sidebar{padding:24px;position:sticky;top:96px;height:fit-content}.docs-sidebar h3{font-size:1rem;margin-bottom:16px;color:var(--text-primary)}.docs-sidebar a{display:block;padding:12px 14px;border-radius:10px;color:var(--text-secondary);margin-bottom:8px;transition:all .25s ease}.docs-sidebar a:hover,.docs-sidebar a.active{background:rgba(108,92,231,.14);color:var(--text-primary)}.docs-content{padding:32px;min-width:0}.docs-content h1{font-size:2.5rem;margin-bottom:14px}.docs-content h2{font-size:1.4rem;margin:28px 0 14px}.docs-content p{color:var(--text-secondary);line-height:1.85;margin-bottom:16px}.docs-list{display:grid;gap:12px;margin:16px 0 0}.docs-list .item{padding:14px 16px;border-radius:12px;background:var(--bg-secondary);border:1px solid var(--border-color);color:var(--text-secondary)}@media (max-width:1100px){.docs-layout{grid-template-columns:1fr}.docs-sidebar{position:static}}@media (max-width:768px){.docs-layout{padding-top:96px}.docs-content h1{font-size:2rem}}</style></head>
<body><header><div class="container"><div class="header-content"><a href="index.html" class="logo"><div class="logo-icon">🍀</div><span>LuckyClover</span></a><button class="mobile-menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></button><nav><a href="index.html">首页</a><a href="docs.html">文档</a><a href="huodong.html">活动</a><a href="team.html">团队</a><a href="status.html">服务器状态</a><a href="note.html">最新动态</a><button class="docs-search-btn" type="button" onclick="openDocsSearch()">搜索</button></nav></div></div></header><main class="docs-layout"><aside class="docs-sidebar"><h3>目录</h3><a href="docs-overview.html">概览</a><a href="docs-server-info.html">服务器信息</a><a href="docs-command-guide.html">指令说明</a><a href="docs-rules.html">玩家守则</a><a class="active" href="docs-guide.html">新手指南</a><a href="docs-faq.html">常见问题</a><a href="docs.html">返回文档首页</a></aside><section class="docs-content"><h1>新手指南</h1><p>这是给新玩家的入服流程说明。</p><div class="docs-list"><div class="item">在“加入页面”获取 QQ 群入口。</div><div class="item">按照群公告提交申请并等待审核。</div><div class="item">通过后使用服务器地址进入游戏。</div></div></section></main><footer><div class="container"><div class="footer-content"><div class="footer-left"><div class="logo-icon" style="width:32px;height:32px;font-size:1rem;">🍀</div><p>© 2026 LuckyClover. All Rights Reserved.</p></div><div class="footer-right"><a href="https://github.com/beeeee-really">Github</a></div></div></div></footer><div class="docs-search-modal" id="docs-search-modal" aria-hidden="true"><div class="docs-search-panel"><input id="docs-modal-input" type="text" placeholder="搜索文档，按 Ctrl + K"><div class="docs-search-results" id="docs-modal-results"></div></div></div><script>function toggleMenu(){document.querySelector('nav').classList.toggle('active')}document.querySelectorAll('nav a').forEach(link=>link.addEventListener('click',()=>{if(window.innerWidth<=768)document.querySelector('nav').classList.remove('active')}));const docsModal=document.getElementById('docs-search-modal');const docsModalInput=document.getElementById('docs-modal-input');const docsModalResults=document.getElementById('docs-modal-results');const docsPages=[{title:'概览',href:'docs-overview.html',desc:'快速了解服务器与文档结构。',keywords:'概览 快速了解 介绍'},{title:'服务器信息',href:'docs-server-info.html',desc:'查看服务器地址、版本、模式等信息。',keywords:'服务器信息 ip 版本 模式'},{title:'指令说明',href:'docs-command-guide.html',desc:'整理常用指令与权限说明。',keywords:'指令 说明 命令'},{title:'玩家守则',href:'docs-rules.html',desc:'服务器内的行为规范和注意事项。',keywords:'玩家守则 规则 纪律'},{title:'新手指南',href:'docs-guide.html',desc:'新玩家入服流程与基础说明。',keywords:'新手 指南 入服 教程'},{title:'常见问题',href:'docs-faq.html',desc:'常见疑问和快速解答。',keywords:'常见问题 faq 问答'}];function renderDocsResults(query){const text=query.trim().toLowerCase();const items=docsPages.filter(page=>`${page.title} ${page.desc} ${page.keywords}`.toLowerCase().includes(text));docsModalResults.innerHTML=items.map(page=>`<a class="docs-search-result" href="${page.href}"><strong>${page.title}</strong><span>${page.desc}</span></a>`).join('')||'<div class="docs-search-result"><strong>没有结果</strong><span>试试别的关键词</span></div>';}function openDocsSearch(){docsModal.classList.add('active');docsModal.setAttribute('aria-hidden','false');docsModalInput.value='';renderDocsResults('');setTimeout(()=>docsModalInput.focus(),0);}function closeDocsSearch(){docsModal.classList.remove('active');docsModal.setAttribute('aria-hidden','true');}docsModalInput.addEventListener('input',()=>renderDocsResults(docsModalInput.value));docsModal.addEventListener('click',event=>{if(event.target===docsModal)closeDocsSearch()});document.addEventListener('keydown',event=>{if((event.ctrlKey||event.metaKey)&&event.key.toLowerCase()==='k'){event.preventDefault();openDocsSearch()}if(event.key==='Escape')closeDocsSearch()});</script></body></html>
