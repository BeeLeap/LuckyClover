<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="查看 LuckyClover 服务器状态，了解在线人数、版本、游戏模式与运行情况。">
  <title>服务器状态 - LuckyClover</title>
  <link rel="stylesheet" href="assets/css/modern-fixed.css">
  <link rel="icon" href="images/cd.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .status-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 48px; text-align: center; max-width: 760px; margin: 0 auto; }
    .status-server-ip { font-size: 1.5rem; font-weight: 600; margin: 16px 0; padding: 16px; background: var(--bg-secondary); border-radius: var(--radius-md); }
    .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(0, 210, 106, 0.1); color: #00d26a; border-radius: 50px; font-weight: 500; }
    .status-badge .dot { width: 8px; height: 8px; background: #00d26a; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .page-header { text-align: center; padding: 120px 24px 60px; }
    .page-header h1 { font-size: 3rem; margin-bottom: 16px; }
    .status-offline { background: rgba(244, 67, 54, 0.1); color: #f44336; }
    .status-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
    .status-detail { background: var(--bg-secondary); padding: 16px; border-radius: var(--radius-md); }
    .status-detail .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
    .status-detail .value { font-size: 1rem; font-weight: 500; }
    @media (max-width: 600px) { .status-details { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo"><div class="logo-icon">🍀</div><span>LuckyClover</span></a>
        <button class="mobile-menu-btn" type="button" onclick="toggleMenu()" aria-label="切换菜单" aria-controls="main-nav" aria-expanded="false"><span></span><span></span><span></span></button>
        <nav id="main-nav">
          <a href="index.html">首页</a>
          <a href="docs.html">文档</a>
          <a href="huodong.html">活动</a>
          <a href="team.html">团队</a>
          <a href="status.html" class="active" aria-current="page">服务器状态</a>
          <a href="note.html">最新动态</a>
        </nav>
      </div>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <h1>服务器<span style="color: var(--accent-secondary);">状态</span></h1>
      <p>实时查看 LuckyClover 运行情况</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="status-card">
        <div class="status-badge" id="status-badge">
          <span class="dot"></span>
          <span id="status-text">检测中...</span>
        </div>
        <div class="status-server-ip">LuckyClover</div>
        <p style="color: var(--text-secondary);">Minecraft Bedrock</p>
        <div class="status-details">
          <div class="status-detail">
            <div class="label">在线玩家</div>
            <div class="value" id="players">--</div>
          </div>
          <div class="status-detail">
            <div class="label">游戏版本</div>
            <div class="value" id="version">--</div>
          </div>
          <div class="status-detail">
            <div class="label">游戏模式</div>
            <div class="value" id="gamemode">--</div>
          </div>
        </div>
        <div class="status-details" style="margin-top: 16px; grid-template-columns: 1fr;">
          <div class="status-detail">
            <div class="label">MOTD</div>
            <div class="value" id="motd" style="font-size: 0.875rem;">--</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-left">
          <div class="logo-icon" style="width:32px;height:32px;font-size:1rem;">🍀</div>
          <p>© 2026 LuckyClover. All Rights Reserved.</p>
        </div>
        <div class="footer-right">
          <a href="https://github.com/beeeee-really">Github</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    async function updateServerStatus() {
      try {
        const response = await fetch(`https://motd.minebbs.com/api/status?ip=play.beeeeeawa.top&port=19135&stype=auto&_=${Date.now()}`, { cache: 'no-store' });
        const data = await response.json();

        const badge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');

        if (data.status === 'online') {
          badge.className = 'status-badge';
          statusText.textContent = '在线';
          document.getElementById('players').textContent = `${data.players.online}/${data.players.max}`;
          document.getElementById('version').textContent = data.version || '--';
          document.getElementById('gamemode').textContent = data.gamemode || '生存';
          document.getElementById('motd').textContent = data.motd || '-';
        } else {
          badge.className = 'status-badge status-offline';
          statusText.textContent = '离线';
          document.getElementById('players').textContent = '0';
          document.getElementById('version').textContent = '--';
          document.getElementById('gamemode').textContent = '--';
          document.getElementById('motd').textContent = '服务器离线';
        }
      } catch (error) {
        const badge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');
        badge.className = 'status-badge status-offline';
        statusText.textContent = '查询失败';
      }
    }

    setInterval(updateServerStatus, 30000);
    updateServerStatus();
    function toggleMenu() {
      const nav = document.getElementById('main-nav');
      const button = document.querySelector('.mobile-menu-btn');
      const isActive = nav.classList.toggle('active');
      button.setAttribute('aria-expanded', isActive ? 'true' : 'false');
    }
    document.querySelectorAll('#main-nav a').forEach(link => { link.addEventListener('click', () => { if (window.innerWidth <= 768) { const nav = document.getElementById('main-nav'); const button = document.querySelector('.mobile-menu-btn'); nav.classList.remove('active'); button.setAttribute('aria-expanded', 'false'); } }); });
  </script>
</body>
</html>
