<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服内风景 - LuckyClover</title>
  <link rel="stylesheet" href="assets/css/modern.css">
  <link rel="shortcut icon" href="images/cd.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
    .gallery-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow: hidden; transition: all 0.3s ease; }
    .gallery-item:hover { transform: translateY(-4px); border-color: var(--border-hover); }
    .gallery-item img { width: 100%; height: 250px; object-fit: cover; }
    .gallery-item .info { padding: 20px; }
    .gallery-item h3 { font-size: 1.125rem; margin-bottom: 8px; }
    .gallery-item p { color: var(--text-secondary); font-size: 0.875rem; }
    .page-header { text-align: center; padding: 120px 24px 60px; }
    .page-header h1 { font-size: 3rem; margin-bottom: 16px; }
    .page-header p { font-size: 1.125rem; color: var(--text-secondary); }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo"><div class="logo-icon">🍀</div><span>LuckyClover</span></a>
        <button class="mobile-menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
        <nav>
          <a href="index.html">首页</a>
          <a href="team.html">团队</a>
          <a href="status.html">服务器状态</a>
          <a href="note.html">最新动态</a>
        </nav>
      </div>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <h1>服内<span style="color: var(--accent-secondary);">风景</span></h1>
      <p>这里是服务器成员的一些奇思妙想</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="gallery-grid">
        <div class="gallery-item">
          <img src="images/pic63.png" alt="服务器建筑">
          <div class="info">
            <h3>服务器建筑</h3>
            <p>服务器内的精彩建筑展示</p>
          </div>
        </div>
        <div class="gallery-item">
          <img src="images/pic28.png" alt="建筑艺术">
          <div class="info">
            <h3>建筑艺术</h3>
            <p>Appreciate architecture</p>
          </div>
        </div>
        <div class="gallery-item">
          <img src="images/pic05.jpg" alt="生存建筑">
          <div class="info">
            <h3>生存建筑</h3>
            <p>玩家们在服务器中的创作</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-left">
          <div class="logo-icon" style="width:32px;height:32px;font-size:1rem;">🍀</div>
          <p>© 2024 LuckyClover. All Rights Reserved.</p>
        </div>
        <div class="footer-right">
          <a href="https://github.com/beeeee-really">Github</a>
        </div>
      </div>
    </div>
  </footer>
  <script>
    function toggleMenu() { document.querySelector('nav').classList.toggle('active'); }
    document.querySelectorAll('nav a').forEach(link => { link.addEventListener('click', () => { if (window.innerWidth <= 768) document.querySelector('nav').classList.remove('active'); }); });
  </script>
</body>
</html>
