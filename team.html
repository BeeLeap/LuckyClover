<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="了解 LuckyClover 管理团队，查看服务器核心成员与各自负责的工作。">
  <title>LuckyClover Team - 团队</title>
  <link rel="stylesheet" href="assets/css/modern-fixed.css">
  <link rel="icon" href="images/cd.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-top: 48px; }
    .team-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 32px; text-align: center; transition: all 0.3s ease; }
    .team-card:hover { transform: translateY(-4px); border-color: var(--border-hover); box-shadow: var(--shadow-card); }
    .team-avatar { width: 80px; height: 80px; background: var(--accent-gradient); border-radius: var(--radius-full); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .team-card h3 { font-size: 1.25rem; margin-bottom: 8px; }
    .team-card p { color: var(--text-secondary); font-size: 0.9rem; }
    .page-header { text-align: center; padding: 120px 24px 60px; }
    .page-header h1 { font-size: 3rem; margin-bottom: 16px; }
    .page-header p { font-size: 1.125rem; color: var(--text-secondary); }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo"><div class="logo-icon">🍀</div><span>LuckyClover</span></a>
        <button class="mobile-menu-btn" type="button" onclick="toggleMenu()" aria-label="切换菜单" aria-controls="main-nav" aria-expanded="false"><span></span><span></span><span></span></button>
        <nav id="main-nav">
          <a href="index.html">首页</a>
          <a href="docs.html">文档</a>
          <a href="huodong.html">活动</a>
          <a href="team.html" class="active" aria-current="page">团队</a>
          <a href="status.html">服务器状态</a>
          <a href="note.html">最新动态</a>
        </nav>
      </div>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <h1>LuckyClover <span style="color: var(--accent-secondary);">Team</span></h1>
      <p>维护服务器稳定运行的核心成员</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="team-grid">
        <div class="team-card">
          <div class="team-avatar">👑</div>
          <h3>Beeeeereally</h3>
          <p>服主，负责整体规划与服务器运营。</p>
        </div>
        <div class="team-card">
          <div class="team-avatar">🛠</div>
          <h3>DreamXbox1961</h3>
          <p>管理员，负责日常维护、活动与玩家支持。</p>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-left">
          <div class="logo-icon" style="width:32px;height:32px;font-size:1rem;">🍀</div>
          <p>© 2026 LuckyClover. All Rights Reserved.</p>
        </div>
        <div class="footer-right">
          <a href="https://github.com/beeeee-really">Github</a>
        </div>
      </div>
    </div>
  </footer>
  <script>
    function toggleMenu() {
      const nav = document.getElementById('main-nav');
      const button = document.querySelector('.mobile-menu-btn');
      const isActive = nav.classList.toggle('active');
      button.setAttribute('aria-expanded', isActive ? 'true' : 'false');
    }
    document.querySelectorAll('#main-nav a').forEach(link => { link.addEventListener('click', () => { if (window.innerWidth <= 768) { const nav = document.getElementById('main-nav'); const button = document.querySelector('.mobile-menu-btn'); nav.classList.remove('active'); button.setAttribute('aria-expanded', 'false'); } }); });
  </script>
</body>
</html>
